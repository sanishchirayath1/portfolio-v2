name: nightly-snapshot

on:
  schedule:
    # 03:00 UTC every day
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync snapshot
        run: pnpm snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain content/projects.snapshot.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/projects.snapshot.json
            git commit -m "chore: refresh projects snapshot"
            git push
          else
            echo "No snapshot changes."
          fi
